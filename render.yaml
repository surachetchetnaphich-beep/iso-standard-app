services:
  - type: web
    name: iso-peak-app
    runtime: python
    pythonVersion: 3.10.12
    buildCommand: "./build.sh"
    startCommand: "PYTHONPATH=. gunicorn config.wsgi:application --log-file -"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iso-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*"
    disk:
      name: iso-media-storage
      mountPath: /opt/render/project/src/media
      sizeGB: 1

databases:
  - name: iso-db
    plan: free
